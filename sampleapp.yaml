apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/image-list: docker.io/opsmxdev/issuegen:~v3
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/githubsecret
  name: imageupdatetest
spec:
  destination:
    server: https://kubernetes.default.svc
  project: default
  source:
    kustomize:
      namePrefix: image
      nameSuffix: update
    path: kubernetes
    repoURL: https://github.com/girichinna27/appleads-k8s.git
    targetRevision: main
